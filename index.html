<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto</title>
    
    <style>
        /* Remove as margens padrão do navegador e garante que a tela ocupe 100% da altura */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa; /* Cor de fundo suave */
            
            /* Usando Flexbox para centralizar tudo na tela inteira */
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
        }

        /* Container para manter o título em cima e a foto embaixo */
        .container {
            display: flex;
            flex-direction: column; /* Coloca os itens em coluna (um embaixo do outro) */
            align-items: center;    /* Centraliza os itens dentro do container */
            gap: 20px;              /* Espaço entre o título e a imagem */
        }

        h1 {
            font-size: 3rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Estilização da foto */
        img {
            max-width: 90vw; /* Limita a largura para caber no celular */
            max-height: 60vh; /* Limita a altura para não criar barra de rolagem */
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2); /* Sombreado bonito */
            cursor: pointer; /* Muda o cursor para "mãozinha" indicando que é clicável */
            transition: transform 0.2s ease-in-out;
        }

        /* Pequeno efeito ao passar o mouse por cima da imagem */
        img:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Alfabeto</h1>
        <!-- A imagem inicial que vai aparecer (f1.jpg) -->
        <img id="fotoAlfabeto" src="fotos/f1.jpg" alt="Letra do Alfabeto">
    </div>

    <script>
        // Pega o elemento da imagem pelo seu ID
        const imagem = document.getElementById('fotoAlfabeto');
        
        // Variável de controle para saber qual é a foto atual
        let fotoAtual = 1;
        
        // Total de letras do alfabeto (26 fotos no total)
        const totalDeFotos = 26; 

        // Adiciona um evento que detecta toda vez que a imagem for clicada
        imagem.addEventListener('click', () => {
            // Aumenta o número da foto (+1)
            fotoAtual++;

            // Se o número da foto passar de 26, volta para a primeira foto (f1.jpg)
            if (fotoAtual > totalDeFotos) {
                fotoAtual = 1;
            }

            // Altera o caminho (src) da imagem dinamicamente para carregar a próxima
            imagem.src = `fotos/f${fotoAtual}.jpg`;
        });
    </script>

</body>
</html>
