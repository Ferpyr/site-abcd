<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicativo do Alfabeto</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #061126 0%, #122b5e 100%);
            color: #ffffff;
            overflow: hidden; 
        }

        /* Sistema de Telas */
        .tela {
            display: none; /* Esconde todas as telas por padrão */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        .tela.ativa {
            display: flex; /* Mostra apenas a tela ativa */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Estilos Globais de Títulos e Textos */
        h1, h2 {
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #4facfe;
            text-shadow: 0px 4px 15px rgba(79, 172, 254, 0.4);
            margin-bottom: 20px;
        }

        h1 { font-size: 3.5rem; }
        h2 { font-size: 2.5rem; margin-top: 20px; }

        /* Botões do Menu */
        .btn-menu {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(79, 172, 254, 0.5);
            color: white;
            font-size: 1.5rem;
            padding: 15px 40px;
            margin: 10px;
            border-radius: 30px;
            cursor: pointer;
            width: 300px;
            transition: all 0.3s ease;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn-menu:hover {
            background: rgba(79, 172, 254, 0.3);
            transform: translateY(-3px);
            box-shadow: 0px 12px 25px rgba(79, 172, 254, 0.4);
        }

        .btn-voltar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ================= TELA MODO HISTÓRIA ================= */
        p#textoLetra {
            font-size: 1.2rem;
            color: #a0aec0;
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        img {
            max-width: 85vw;
            max-height: 55vh;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6), 0px 0px 20px rgba(79, 172, 254, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        img:hover { transform: scale(1.03) translateY(-5px); }
        img:active { transform: scale(0.98); }

        /* ================= TELA MODO PIANO ================= */
        .piano-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 15px;
            width: 90vw;
            max-width: 800px;
            margin-top: 20px;
        }

        .tecla-piano {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            padding: 20px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.4);
        }

        .tecla-piano:hover {
            background: #4facfe;
            border-color: #4facfe;
            transform: scale(1.1);
            box-shadow: 0px 10px 20px rgba(79, 172, 254, 0.6);
        }

        .tecla-piano:active {
            transform: scale(0.9);
            background: #ffffff;
            color: #122b5e;
        }

        /* ================= TELA DE CONFIGURAÇÕES ================= */
        .config-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            width: 90vw;
            max-width: 500px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .config-box label {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #4facfe;
        }

        /* Estilo do Slider de Volume */
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        #volumeTexto {
            float: right;
            font-weight: bold;
            color: #ffffff;
        }

        /* Dropdown da letra inicial */
        select {
            width: 100%;
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(79, 172, 254, 0.5);
            cursor: pointer;
        }

        select option {
            background: #122b5e;
            color: white;
        }

    </style>
</head>
<body>

    <!-- ================= TELA 1: MENU PRINCIPAL ================= -->
    <div id="telaMenu" class="tela ativa">
        <h1>Alfabeto</h1>
        <p style="margin-bottom: 40px; color: #a0aec0;">Escolha um modo de jogo</p>

        <button class="btn-menu" onclick="abrirTela('telaHistoria')">🖼️ Modo História</button>
        <button class="btn-menu" onclick="abrirTela('telaPiano')">🎹 Modo Piano</button>
        <button class="btn-menu" onclick="abrirTela('telaConfig')">⚙️ Configurações</button>
    </div>

    <!-- ================= TELA 2: MODO HISTÓRIA ================= -->
    <div id="telaHistoria" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2>História</h2>
        
        <p id="textoLetra"><span class="icone-som">🔊</span> Letra A (1 / 26)</p>
        <img id="fotoAlfabeto" src="" alt="Letra do Alfabeto">
        <p style="margin-top: 15px; color: rgba(255,255,255,0.4); font-size: 0.9rem;">Clique na foto ou use ⬅️ ➡️ no teclado</p>
    </div>

    <!-- ================= TELA 3: MODO PIANO ================= -->
    <div id="telaPiano" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2>Modo Piano</h2>
        <p style="color: #a0aec0;">Clique nas teclas para ouvir o som das letras</p>
        
        <!-- As teclas serão geradas automaticamente pelo JavaScript -->
        <div id="pianoGrid" class="piano-grid"></div>
    </div>

    <!-- ================= TELA 4: CONFIGURAÇÕES ================= -->
    <div id="telaConfig" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2>Configurações</h2>

        <div class="config-box">
            <label>
                🔊 Volume da Voz 
                <span id="volumeTexto">100%</span>
            </label>
            <!-- Slider vai de 0 até 573% conforme você pediu 😂 -->
            <input type="range" id="controleVolume" min="0" max="573" value="100" oninput="atualizarVolume()">
        </div>

        <div class="config-box">
            <label>🏁 Começar o Modo História na letra:</label>
            <select id="seletorLetra">
                <!-- Letras geradas pelo JavaScript -->
            </select>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script>
        // Variáveis de Estado (Configurações)
        let volumeAtual = 100;
        let letraInicial = 1; // 1 = A
        let fotoAtual = 1;
        const totalDeFotos = 26;
        let estaTrocando = false; 

        const imagem = document.getElementById('fotoAlfabeto');
        const textoLetra = document.getElementById('textoLetra');

        // ==== NAVEGAÇÃO DE TELAS ====
        function abrirTela(idTela) {
            // Esconde todas as telas
            document.querySelectorAll('.tela').forEach(tela => {
                tela.classList.remove('ativa');
            });
            
            // Mostra a tela desejada
            document.getElementById(idTela).classList.add('ativa');

            // Se for abrir o modo história, carrega a foto inicial escolhida nas configurações
            if (idTela === 'telaHistoria') {
                fotoAtual = letraInicial;
                carregarFoto(true); // "true" significa que é o primeiro carregamento, não avança letra
            }
        }

        // ==== CONFIGURAÇÕES DE VOLUME E LETRA ====
        function atualizarVolume() {
            const controle = document.getElementById('controleVolume');
            volumeAtual = controle.value;
            document.getElementById('volumeTexto').innerText = volumeAtual + "%";
            
            // Faz um pequeno barulho de teste se soltar no número exato
            if(volumeAtual % 100 === 0 || volumeAtual == 573) {
                falarLetra("Teste");
            }
        }

        document.getElementById('seletorLetra').addEventListener('change', (e) => {
            letraInicial = parseInt(e.target.value);
        });

        // ==== FUNÇÃO DO ROBÔ DE VOZ ====
        function falarLetra(letra) {
            window.speechSynthesis.cancel();
            let fala = new SpeechSynthesisUtterance(letra);
            fala.lang = 'pt-BR';
            
            // O navegador aceita volume de 0.0 até 1.0
            // Então dividimos por 100. (Se o volume for 573, mandamos 5.73 e o navegador força no máximo dele!)
            fala.volume = volumeAtual / 100; 

            window.speechSynthesis.speak(fala);
        }

        // ==== LÓGICA DO MODO HISTÓRIA ====
        function carregarFoto(carregamentoInicial = false) {
            imagem.style.opacity = 0;

            setTimeout(() => {
                const nomeDaLetra = String.fromCharCode(64 + fotoAtual);
                textoLetra.innerHTML = `<span class="icone-som">🔊</span> Letra ${nomeDaLetra} (${fotoAtual} / 26)`;

                imagem.onload = () => {
                    imagem.style.opacity = 1;
                    estaTrocando = false; 
                    
                    // Só fala automaticamente se não for o exato momento que o site abriu pela 1ª vez
                    falarLetra(nomeDaLetra);
                };

                // Troca o arquivo da foto
                imagem.src = `fotos/f${fotoAtual}.jpg`;

            }, 200);
        }

        function mudarFoto(direcao) {
            // Só funciona se estiver na tela do Modo História
            if (!document.getElementById('telaHistoria').classList.contains('ativa')) return;
            if (estaTrocando) return; 
            
            estaTrocando = true;

            if (direcao === 'frente') {
                fotoAtual++;
                if (fotoAtual > totalDeFotos) fotoAtual = 1;
            } else if (direcao === 'tras') {
                fotoAtual--;
                if (fotoAtual < 1) fotoAtual = totalDeFotos;
            }

            carregarFoto();
        }

        imagem.addEventListener('click', () => mudarFoto('frente'));

        document.addEventListener('keydown', (evento) => {
            if (evento.key === 'ArrowRight') mudarFoto('frente'); 
            if (evento.key === 'ArrowLeft') mudarFoto('tras');   
        });

        // ==== GERAÇÃO AUTOMÁTICA DA INTERFACE (PIANO E SELECT) ====
        window.onload = () => {
            const pianoGrid = document.getElementById('pianoGrid');
            const seletor = document.getElementById('seletorLetra');

            for (let i = 1; i <= totalDeFotos; i++) {
                const letra = String.fromCharCode(64 + i);

                // 1. Gera as teclas do Piano
                const tecla = document.createElement('button');
                tecla.className = 'tecla-piano';
                tecla.innerText = letra;
                tecla.onclick = () => falarLetra(letra);
                pianoGrid.appendChild(tecla);

                // 2. Preenche o Select de Configurações ("Começar na letra...")
                const opcao = document.createElement('option');
                opcao.value = i;
                opcao.innerText = `${letra} (Foto ${i})`;
                seletor.appendChild(opcao);
            }
        };

    </script>
</body>
</html>
