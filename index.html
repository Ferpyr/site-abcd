<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto Interativo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { min-height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #061126 0%, #122b5e 100%); color: #ffffff; overflow-x: hidden; }

        /* Sistema de Telas */
        .tela { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; text-align: center; animation: fadeIn 0.4s ease-in-out; padding: 20px; }
        .tela.ativa { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 3.5rem; color: #4facfe; margin-bottom: 10px; text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
        h2 { font-size: 2.2rem; color: #4facfe; margin-bottom: 20px; }

        /* Botões Estilizados */
        .btn-menu { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(79, 172, 254, 0.5); color: white; font-size: 1.1rem; padding: 15px 25px; margin: 8px; border-radius: 30px; cursor: pointer; width: 340px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-menu:hover:not(.bloqueado) { background: rgba(79, 172, 254, 0.3); transform: translateY(-3px); }
        .btn-menu.bloqueado { background: rgba(0, 0, 0, 0.3); border-color: rgba(255,255,255,0.1); color: #666; cursor: not-allowed; }
        .btn-voltar { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.1); border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; z-index: 100; }

        /* Visor de Fotos */
        .foto-principal { max-width: 80vw; max-height: 50vh; border-radius: 20px; border: 4px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); cursor: pointer; transition: 0.3s; }
        #textoLetra { font-size: 1.5rem; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 5px 20px; border-radius: 20px; }
        select { padding: 10px; border-radius: 10px; background: #061126; color: white; border: 1px solid #4facfe; margin-bottom: 15px; font-size: 1rem; }

        /* Piano */
        .piano-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; width: 90vw; max-width: 800px; max-height: 70vh; overflow-y: auto; padding: 10px; }
        .img-piano { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s; }
        .img-piano:hover { transform: scale(1.1); border-color: #4facfe; }

        /* Quiz */
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90vw; max-width: 500px; }
        .btn-quiz { background: rgba(255,255,255,0.1); border: 2px solid #4facfe; color: white; padding: 20px; font-size: 2rem; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .btn-quiz.correta { background: #28a745; }
        .btn-quiz.errada { background: #dc3545; }

        /* Desafios QTE */
        .qte-container { position: relative; width: 250px; height: 250px; margin: 20px; }
        .qte-img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; border: 4px solid #4facfe; }
        .qte-letra-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; font-weight: bold; text-shadow: 0 0 20px #000; color: white; pointer-events: none; }
        .barra-bg { width: 80vw; max-width: 600px; height: 30px; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 10px; border: 2px solid #4facfe; }
        .barra-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); transition: width 0.2s; }
        .barra-tempo-bg { width: 40vw; max-width: 300px; height: 8px; background: #000; border-radius: 4px; margin-top: 10px; }
        .barra-tempo-fill { width: 100%; height: 100%; background: #ffc107; }

        .flash-v { background-color: rgba(40, 167, 69, 0.4) !important; }
        .flash-e { background-color: rgba(220, 53, 69, 0.4) !important; }
    </style>
</head>
<body>

    <!-- MENU -->
    <div id="telaMenu" class="tela ativa">
        <h1>Alfabeto</h1>
        <button class="btn-menu" onclick="abrirVisor('historia')">📖 Modo História</button>
        <button class="btn-menu" onclick="abrirVisor('livre')">🔓 Modo Livre</button>
        <button class="btn-menu" onclick="abrirTela('telaPiano')">🎹 Modo Piano</button>
        <button class="btn-menu" onclick="abrirTela('telaQuiz')">🧠 Modo Quiz</button>
        <button id="btnQTE1" class="btn-menu bloqueado" onclick="iniciarQTE(1)">🔒 Desafio 1 (Reflexo)</button>
        <button id="btnQTE2" class="btn-menu bloqueado" onclick="iniciarQTE(2)">🔒 Desafio 2 (Drenagem)</button>
        <button class="btn-menu" onclick="abrirTela('telaConfig')" style="margin-top:20px">⚙️ Configurações</button>
    </div>

    <!-- VISOR (HISTÓRIA E LIVRE) -->
    <div id="telaVisor" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2 id="tituloVisor">Modo</h2>
        <select id="seletorLivre" onchange="selecionarLetraLivre(this.value)"></select>
        <p id="textoLetra">Letra A (1/26)</p>
        <img id="fotoPrincipal" class="foto-principal" src="fotos/f1.jpg" onclick="proximaFoto()">
    </div>

    <!-- PIANO -->
    <div id="telaPiano" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2>Modo Piano</h2>
        <div id="pianoGrid" class="piano-grid"></div>
    </div>

    <!-- QUIZ -->
    <div id="telaQuiz" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2 id="quizPergunta">Pergunta</h2>
        <div id="quizRespostas" class="quiz-grid"></div>
    </div>

    <!-- DESAFIOS (QTE) -->
    <div id="telaDesafio" class="tela">
        <button class="btn-voltar" onclick="sairDesafio()">⬅ Desistir</button>
        <h2 id="qteTitulo">Nível 1</h2>
        <div class="barra-bg"><div id="qteBarraProgresso" class="barra-fill"></div></div>
        <div class="qte-container">
            <img id="qteFoto" class="qte-img" src="fotos/f1.jpg">
            <div id="qteLetraTxt" class="qte-letra-overlay">A</div>
        </div>
        <div id="areaTempo" class="barra-tempo-bg"><div id="qteBarraTempo" class="barra-tempo-fill"></div></div>
        <p id="qteStatus" style="margin-top:10px; font-weight:bold"></p>
    </div>

    <!-- CONFIG -->
    <div id="telaConfig" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2>Configurações</h2>
        <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:20px; width:340px">
            <label>Volume: <span id="valVol">100</span>%</label><br><br>
            <input type="range" id="inputVol" min="0" max="573" value="100" style="width:100%" 
                   oninput="document.getElementById('valVol').innerText = this.value" 
                   onchange="atualizarVol(this.value)">
        </div>
    </div>

    <script>
        // ESTADO GLOBAL
        let volume = 100, fotoAtual = 1, desbloqueado = false, modoAtual = '';
        let qteAtivo = false, qteTipo = 1, qteNivel = 1, qteProgresso = 0, qteLetra = '', timerQTE, loopQTE;

        // DIFICULDADE NERFADA (Lvl 7-10 agora são possíveis)
        const diffs = [null,
            { tempo: 2500, dreno: 0.1, cura: 20 }, { tempo: 2200, dreno: 0.15, cura: 18 },
            { tempo: 1900, dreno: 0.2, cura: 15 }, { tempo: 1600, dreno: 0.25, cura: 13 },
            { tempo: 1300, dreno: 0.3, cura: 12 }, { tempo: 1100, dreno: 0.35, cura: 10 },
            { tempo: 1000, dreno: 0.4, cura: 10 }, { tempo: 900,  dreno: 0.45, cura: 9 }, // Nerf aqui
            { tempo: 800,  dreno: 0.5,  cura: 8 },  { tempo: 700,  dreno: 0.6,  cura: 8 }  // Nerf aqui
        ];

        // INICIALIZAÇÃO
        window.onload = () => {
            const grid = document.getElementById('pianoGrid');
            const sel = document.getElementById('seletorLivre');
            for(let i=1; i<=26; i++) {
                let letra = String.fromCharCode(64 + i);
                // Piano
                let img = document.createElement('img');
                img.src = `fotos/f${i}.jpg`; img.className = 'img-piano';
                img.onclick = () => falar(letra);
                grid.appendChild(img);
                // Seletor
                let opt = document.createElement('option');
                opt.value = i; opt.innerText = "Letra " + letra;
                sel.appendChild(opt);
            }
        };

        function abrirTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            if(id === 'telaQuiz') gerarQuiz();
        }

        function falar(txt) {
            if(qteAtivo) return;
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'pt-BR'; msg.volume = volume / 100;
            window.speechSynthesis.speak(msg);
        }

        function atualizarVol(v) { volume = v; falar("Teste"); }

        // VISOR
        function abrirVisor(m) {
            modoAtual = m; fotoAtual = 1;
            document.getElementById('tituloVisor').innerText = m === 'historia' ? "Modo História" : "Modo Livre";
            document.getElementById('seletorLivre').style.display = m === 'livre' ? "block" : "none";
            carregarFoto(true); abrirTela('telaVisor');
        }

        function selecionarLetraLivre(v) { fotoAtual = parseInt(v); carregarFoto(true); }

        function proximaFoto() {
            fotoAtual++;
            if(fotoAtual > 26) { fotoAtual = 1; }
            carregarFoto(false);
        }

        function carregarFoto(silencioso) {
            const img = document.getElementById('fotoPrincipal');
            const txt = document.getElementById('textoLetra');
            let letra = String.fromCharCode(64 + fotoAtual);
            
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = `fotos/f${fotoAtual}.jpg`;
                txt.innerText = `Letra ${letra} (${fotoAtual}/26)`;
                img.onload = () => {
                    img.style.opacity = 1;
                    if(!silencioso) falar(letra);
                    if(modoAtual === 'historia' && fotoAtual === 26 && !desbloqueado) liberarDesafios();
                };
            }, 200);
        }

        function liberarDesafios() {
            desbloqueado = true;
            document.getElementById('btnQTE1').classList.remove('bloqueado');
            document.getElementById('btnQTE1').innerText = "⚡ Desafio 1 (Reflexo)";
            document.getElementById('btnQTE2').classList.remove('bloqueado');
            document.getElementById('btnQTE2').innerText = "🔥 Desafio 2 (Drenagem)";
            alert("🎉 Parabéns! Você completou o alfabeto e desbloqueou os Desafios!");
        }

        // QUIZ
        function gerarQuiz() {
            const perguntas = [
                () => { let n = Math.floor(Math.random()*25)+1; return { q: `Qual letra vem depois de ${String.fromCharCode(64+n)}?`, a: String.fromCharCode(64+n+1) }; },
                () => { let n = Math.floor(Math.random()*26)+1; return { q: `Qual é a ${n}ª letra do alfabeto?`, a: String.fromCharCode(64+n) }; },
                () => { let n = Math.floor(Math.random()*15)+1; let p = Math.floor(Math.random()*5)+2; return { q: `Qual letra está ${p} casas à frente de ${String.fromCharCode(64+n)}?`, a: String.fromCharCode(64+n+p) }; }
            ];
            let obj = perguntas[Math.floor(Math.random()*perguntas.length)]();
            document.getElementById('quizPergunta').innerText = obj.q;
            let opcoes = [obj.a];
            while(opcoes.length < 4) {
                let err = String.fromCharCode(64 + Math.floor(Math.random()*26)+1);
                if(!opcoes.includes(err)) opcoes.push(err);
            }
            opcoes.sort(() => Math.random() - 0.5);
            const res = document.getElementById('quizRespostas'); res.innerHTML = '';
            opcoes.forEach(opt => {
                let btn = document.createElement('button'); btn.className = 'btn-quiz'; btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === obj.a) { btn.classList.add('correta'); falar("Correto!"); setTimeout(gerarQuiz, 1000); }
                    else { btn.classList.add('errada'); falar("Tente de novo"); setTimeout(()=>btn.classList.remove('errada'), 500); }
                };
                res.appendChild(btn);
            });
        }

        // DESAFIOS (QTE)
        function iniciarQTE(tipo) {
            if(!desbloqueado) return;
            qteTipo = tipo; qteNivel = 1; qteProgresso = tipo === 1 ? 0 : 50;
            qteAtivo = true;
            document.getElementById('areaTempo').style.opacity = tipo === 1 ? 1 : 0;
            abrirTela('telaDesafio');
            proximaLetraQTE();
            if(tipo === 2) loopQTE = setInterval(drenarQTE, 50);
        }

        function proximaLetraQTE() {
            let n = Math.floor(Math.random()*26)+1;
            qteLetra = String.fromCharCode(64 + n);
            document.getElementById('qteFoto').src = `fotos/f${n}.jpg`;
            document.getElementById('qteLetraTxt').innerText = qteLetra;
            document.getElementById('qteTitulo').innerText = (qteTipo === 1 ? "Reflexo: Nível " : "Drenagem: Nível ") + qteNivel;
            
            if(qteTipo === 1) {
                const b = document.getElementById('qteBarraTempo');
                b.style.transition = 'none'; b.style.width = '100%';
                setTimeout(() => {
                    b.style.transition = `width ${diffs[qteNivel].tempo}ms linear`;
                    b.style.width = '0%';
                }, 10);
                clearTimeout(timerQTE);
                timerQTE = setTimeout(() => falhaQTE("Lento!"), diffs[qteNivel].tempo);
            }
        }

        function drenarQTE() {
            qteProgresso -= diffs[qteNivel].dreno;
            if(qteProgresso <= 0) falhaQTE("Esvaziou!");
            document.getElementById('qteBarraProgresso').style.width = qteProgresso + "%";
        }

        function falhaQTE(msg) {
            document.getElementById('qteStatus').innerText = msg;
            document.getElementById('telaDesafio').classList.add('flash-e');
            setTimeout(() => document.getElementById('telaDesafio').classList.remove('flash-e'), 200);
            if(qteTipo === 1) { qteProgresso = Math.max(0, qteProgresso - 10); proximaLetraQTE(); }
            else { qteProgresso = Math.max(0, qteProgresso - 15); }
        }

        function sucessoQTE() {
            document.getElementById('telaDesafio').classList.add('flash-v');
            setTimeout(() => document.getElementById('telaDesafio').classList.remove('flash-v'), 200);
            qteProgresso += diffs[qteNivel].cura;
            if(qteProgresso >= 100) {
                if(qteNivel >= 10) { alert("🏆 VOCÊ É UM MESTRE!"); sairDesafio(); }
                else { qteNivel++; qteProgresso = qteTipo === 1 ? 0 : 50; alert("Nível " + qteNivel); }
            }
            proximaLetraQTE();
        }

        function sairDesafio() {
            qteAtivo = false; clearInterval(loopQTE); clearTimeout(timerQTE);
            abrirTela('telaMenu');
        }

        // TECLADO
        document.addEventListener('keydown', (e) => {
            if(!qteAtivo) {
                if(document.getElementById('telaVisor').classList.contains('ativa')) {
                    if(e.key === 'ArrowRight') proximaFoto();
                    if(e.key === 'ArrowLeft' && modoAtual === 'livre') { fotoAtual--; if(fotoAtual<1) fotoAtual=26; carregarFoto(false); }
                }
                return;
            }
            let key = e.key.toUpperCase();
            if(key === qteLetra) sucessoQTE();
            else falhaQTE("Errado!");
        });

    </script>
</body>
</html>
