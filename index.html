<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #061126 0%, #122b5e 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita barras de rolagem */
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            color: #4facfe;
            text-shadow: 0px 4px 15px rgba(79, 172, 254, 0.4);
        }

        /* O subtítulo agora vai mudar dinamicamente */
        p#textoLetra {
            font-size: 1.2rem;
            color: #a0aec0;
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
        }

        img {
            max-width: 85vw;
            max-height: 55vh;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6), 0px 0px 20px rgba(79, 172, 254, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
        }

        img:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.8), 0px 0px 30px rgba(79, 172, 254, 0.4);
        }

        img:active {
            transform: scale(0.98);
        }

        /* Dica de teclado no rodapé */
        .dica-teclado {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Alfabeto</h1>
        
        <!-- Esse texto vai ser atualizado pelo Javascript -->
        <p id="textoLetra">Letra A (1 / 26)</p>
        
        <img id="fotoAlfabeto" src="fotos/f1.jpg" alt="Letra do Alfabeto">
    </div>

    <!-- Dica flutuante embaixo -->
    <div class="dica-teclado">Use as setas ⬅️ e ➡️ do teclado para navegar ou clique na imagem.</div>

    <script>
        const imagem = document.getElementById('fotoAlfabeto');
        const textoLetra = document.getElementById('textoLetra');
        
        let fotoAtual = 1;
        const totalDeFotos = 26; 
        let estaTrocando = false; // Evita que o usuário clique várias vezes rápido demais e bugue a tela

        // Função principal que troca a foto (agora aceita 'frente' ou 'tras')
        function mudarFoto(direcao) {
            if (estaTrocando) return; // Se já estiver no meio do fade, ignora o novo clique
            estaTrocando = true;

            // 1. Apaga a foto
            imagem.style.opacity = 0;

            setTimeout(() => {
                // 2. Calcula qual é a próxima foto (avança ou volta)
                if (direcao === 'frente') {
                    fotoAtual++;
                    if (fotoAtual > totalDeFotos) fotoAtual = 1;
                } else if (direcao === 'tras') {
                    fotoAtual--;
                    if (fotoAtual < 1) fotoAtual = totalDeFotos;
                }

                // 3. Atualiza o texto (Ex: 65 em código de caracteres é 'A', 66 é 'B')
                // Como nossa foto 1 é A, fazemos 64 + 1 = 65 ('A')
                const nomeDaLetra = String.fromCharCode(64 + fotoAtual);
                textoLetra.innerText = `Letra ${nomeDaLetra} (${fotoAtual} / 26)`;

                // 4. Quando a imagem nova carregar, acende a tela
                imagem.onload = () => {
                    imagem.style.opacity = 1;
                    estaTrocando = false; // Libera para o usuário clicar de novo
                };

                // 5. Troca o arquivo da foto
                imagem.src = `fotos/f${fotoAtual}.jpg`;

                // 6. Preload: Puxa a próxima foto de forma invisível para o cache do navegador
                let proximaFoto = (fotoAtual % totalDeFotos) + 1;
                let imgPreload = new Image();
                imgPreload.src = `fotos/f${proximaFoto}.jpg`;

            }, 300);
        }

        // Clicar na imagem vai para a frente
        imagem.addEventListener('click', () => {
            mudarFoto('frente');
        });

        // Usar as setas do teclado para ir para frente ou para trás
        document.addEventListener('keydown', (evento) => {
            if (evento.key === 'ArrowRight') {
                mudarFoto('frente'); // Seta para direita
            } else if (evento.key === 'ArrowLeft') {
                mudarFoto('tras');   // Seta para esquerda
            }
        });

    </script>

</body>
</html>
