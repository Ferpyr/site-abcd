<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto</title>
    
    <style>
        /* Reset básico de margens e preenchimentos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Fundo azul escuro com um gradiente suave e moderno */
            background: linear-gradient(135deg, #061126 0%, #122b5e 100%);
            color: #ffffff;
            
            /* Flexbox para centralizar tudo na tela */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container principal */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Estilo do Título - com um leve efeito de brilho */
        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            /* Efeito de cor e brilho no texto */
            color: #4facfe;
            text-shadow: 0px 4px 15px rgba(79, 172, 254, 0.4);
        }

        /* Subtítulo indicativo */
        p.instrucao {
            font-size: 1rem;
            color: #a0aec0; /* Cor cinza clarinho */
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Estilização da Foto */
        img {
            max-width: 85vw;
            max-height: 55vh;
            object-fit: cover; /* Faz a imagem se ajustar perfeitamente dentro do espaço */
            border-radius: 16px; /* Bordas mais arredondadas */
            
            /* Borda fina e semi-transparente e sombra marcante para destacar do fundo escuro */
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6), 0px 0px 20px rgba(79, 172, 254, 0.2);
            
            cursor: pointer;
            
            /* Animações suaves para o clique e para passar o mouse */
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
        }

        /* Efeito de "flutuar" ao passar o mouse por cima da foto */
        img:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.8), 0px 0px 30px rgba(79, 172, 254, 0.4);
        }

        /* Efeito visual ao clicar na foto (ela dá uma leve diminuída) */
        img:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Alfabeto</h1>
        <p class="instrucao">Clique na imagem para ver a próxima letra</p>
        
        <!-- A imagem inicial que vai aparecer (f1.jpg) -->
        <img id="fotoAlfabeto" src="fotos/f1.jpg" alt="Letra do Alfabeto">
    </div>

    <script>
        const imagem = document.getElementById('fotoAlfabeto');
        let fotoAtual = 1;
        const totalDeFotos = 26; 

        imagem.addEventListener('click', () => {
            // Cria um efeito de "piscar" (fade out)
            imagem.style.opacity = 0;

            // Espera 300 milissegundos (o tempo do fade out) para trocar a foto
            setTimeout(() => {
                fotoAtual++;

                if (fotoAtual > totalDeFotos) {
                    fotoAtual = 1;
                }

                imagem.src = `fotos/f${fotoAtual}.jpg`;
                
                // Faz a nova foto aparecer suavemente (fade in)
                imagem.style.opacity = 1;
            }, 300); // Esse tempo deve ser igual ao tempo do "transition: opacity" no CSS
        });
    </script>

</body>
</html>
