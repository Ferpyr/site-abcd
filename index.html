<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicativo do Alfabeto</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #061126 0%, #122b5e 100%);
            color: #ffffff;
            overflow: hidden; 
        }

        /* Sistema de Telas */
        .tela {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        .tela.ativa { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1, h2 {
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #4facfe;
            text-shadow: 0px 4px 15px rgba(79, 172, 254, 0.4);
            margin-bottom: 20px;
        }

        h1 { font-size: 3.5rem; }
        h2 { font-size: 2.5rem; margin-top: 20px; }

        /* Botões do Menu */
        .btn-menu {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(79, 172, 254, 0.5);
            color: white;
            font-size: 1.3rem;
            padding: 15px 30px;
            margin: 8px;
            border-radius: 30px;
            cursor: pointer;
            width: 320px;
            transition: all 0.3s ease;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn-menu:hover {
            background: rgba(79, 172, 254, 0.3);
            transform: translateY(-3px);
            box-shadow: 0px 12px 25px rgba(79, 172, 254, 0.4);
        }

        .btn-voltar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            z-index: 10;
        }

        .btn-voltar:hover { background: rgba(255, 255, 255, 0.2); }

        /* ================= TELA DE VISUALIZAÇÃO (HISTÓRIA E LIVRE) ================= */
        p#textoLetra {
            font-size: 1.2rem;
            color: #a0aec0;
            margin-bottom: 15px;
            font-weight: 400;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Seletor do Modo Livre */
        select {
            margin-bottom: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(79, 172, 254, 0.5);
            cursor: pointer;
            display: none; /* Escondido por padrão (aparece só no modo livre) */
        }
        select option { background: #122b5e; color: white; }

        img.foto-principal {
            max-width: 85vw;
            max-height: 50vh;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6), 0px 0px 20px rgba(79, 172, 254, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        img.foto-principal:hover { transform: scale(1.03) translateY(-5px); }
        img.foto-principal:active { transform: scale(0.98); }

        /* ================= TELA MODO PIANO (IMAGENS) ================= */
        .piano-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
            width: 90vw;
            max-width: 800px;
            margin-top: 15px;
            overflow-y: auto;
            max-height: 65vh;
            padding: 10px;
        }

        .img-piano {
            width: 100%;
            aspect-ratio: 1; /* Força todas as imagens a ficarem quadradas perfeitamente */
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.4);
        }

        .img-piano:hover {
            transform: scale(1.1);
            border-color: #4facfe;
            box-shadow: 0px 10px 20px rgba(79, 172, 254, 0.6);
        }
        .img-piano:active { transform: scale(0.9); }

        /* ================= TELA MODO QUIZ ================= */
        #quizPergunta {
            font-size: 1.8rem;
            margin-bottom: 30px;
            padding: 0 20px;
            height: 80px;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90vw;
            max-width: 500px;
        }

        .btn-quiz {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(79, 172, 254, 0.5);
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-quiz:hover { background: rgba(79, 172, 254, 0.3); transform: scale(1.05); }
        .btn-quiz:active { transform: scale(0.95); }
        .btn-quiz.correta { background: #28a745; border-color: #28a745; color: white; }
        .btn-quiz.errada { background: #dc3545; border-color: #dc3545; color: white; }

        /* ================= TELA DE CONFIGURAÇÕES ================= */
        .config-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            width: 90vw;
            max-width: 500px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .config-box label { display: block; font-size: 1.2rem; margin-bottom: 15px; color: #4facfe; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #volumeTexto { float: right; font-weight: bold; color: #ffffff; }
    </style>
</head>
<body>

    <!-- ================= TELA 1: MENU ================= -->
    <div id="telaMenu" class="tela ativa">
        <h1>Alfabeto</h1>
        <p style="margin-bottom: 30px; color: #a0aec0;">Escolha um modo de jogo</p>

        <button class="btn-menu" onclick="abrirVisor('historia')">📖 Modo História</button>
        <button class="btn-menu" onclick="abrirVisor('livre')">🔓 Modo Livre</button>
        <button class="btn-menu" onclick="abrirTela('telaPiano')">🎹 Modo Piano</button>
        <button class="btn-menu" onclick="abrirTela('telaQuiz')">🧠 Modo Quiz</button>
        <button class="btn-menu" onclick="abrirTela('telaConfig')">⚙️ Configurações</button>
    </div>

    <!-- ================= TELA 2: VISUALIZADOR (USADO NO HISTÓRIA E LIVRE) ================= -->
    <div id="telaVisor" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2 id="tituloVisor">Modo</h2>
        
        <!-- Esse seletor só aparece no Modo Livre -->
        <select id="seletorLivre"></select>

        <p id="textoLetra"><span class="icone-som">🔊</span> Letra A (1 / 26)</p>
        <img id="fotoAlfabeto" class="foto-principal" src="" alt="Letra do Alfabeto">
        <p id="dicaVisor" style="margin-top: 15px; color: rgba(255,255,255,0.4); font-size: 0.9rem;">Dica</p>
    </div>

    <!-- ================= TELA 3: MODO PIANO ================= -->
    <div id="telaPiano" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2>Modo Piano</h2>
        <p style="color: #a0aec0;">Clique nas imagens para ouvir as letras</p>
        <div id="pianoGrid" class="piano-grid"></div>
    </div>

    <!-- ================= TELA 4: MODO QUIZ ================= -->
    <div id="telaQuiz" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2>Quiz</h2>
        <p id="quizPergunta">Carregando pergunta...</p>
        <div id="quizRespostas" class="quiz-grid"></div>
    </div>

    <!-- ================= TELA 5: CONFIGURAÇÕES ================= -->
    <div id="telaConfig" class="tela">
        <button class="btn-voltar" onclick="abrirTela('telaMenu')">⬅ Voltar</button>
        <h2>Configurações</h2>

        <div class="config-box">
            <label>🔊 Volume da Voz <span id="volumeTexto">100%</span></label>
            <!-- O slider agora chama uma função enquanto arrasta (oninput) e outra quando solta o dedo (onchange) -->
            <input type="range" id="controleVolume" min="0" max="573" value="100">
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script>
        // ==== VARIÁVEIS GLOBAIS ====
        let volumeAtual = 100;
        let fotoAtual = 1;
        const totalDeFotos = 26;
        let estaTrocando = false; 
        let modoAtual = ''; // 'historia' ou 'livre'

        const imagem = document.getElementById('fotoAlfabeto');
        const textoLetra = document.getElementById('textoLetra');
        const seletorLivre = document.getElementById('seletorLivre');

        // ==== GERAÇÃO DA INTERFACE (PIANO E SELETOR) ====
        window.onload = () => {
            const pianoGrid = document.getElementById('pianoGrid');

            for (let i = 1; i <= totalDeFotos; i++) {
                const letra = String.fromCharCode(64 + i);

                // 1. Gera o Modo Piano com AS IMAGENS FOTOGRÁFICAS
                const imgTecla = document.createElement('img');
                imgTecla.src = `fotos/f${i}.jpg`;
                imgTecla.className = 'img-piano';
                imgTecla.onclick = () => falarLetra(letra);
                pianoGrid.appendChild(imgTecla);

                // 2. Preenche o Seletor do Modo Livre
                const opcao = document.createElement('option');
                opcao.value = i;
                opcao.innerText = `Começar na Letra ${letra}`;
                seletorLivre.appendChild(opcao);
            }
        };

        // ==== NAVEGAÇÃO ENTRE TELAS ====
        function abrirTela(idTela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');

            if(idTela === 'telaQuiz') iniciarQuiz();
        }

        // ==== ROBÔ DE VOZ ====
        function falarLetra(texto) {
            window.speechSynthesis.cancel();
            let fala = new SpeechSynthesisUtterance(texto);
            fala.lang = 'pt-BR';
            // O volume no slider vai até 573. Dividimos por 100 para o navegador.
            fala.volume = volumeAtual / 100; 
            window.speechSynthesis.speak(fala);
        }

        // ==== LÓGICA DO VOLUME ====
        const sliderVolume = document.getElementById('controleVolume');
        const textoVol = document.getElementById('volumeTexto');

        // Enquanto o dedo arrasta, só atualiza o texto (Não faz som)
        sliderVolume.addEventListener('input', () => {
            textoVol.innerText = sliderVolume.value + "%";
        });

        // Quando o dedo SOLTA o slider, salva o volume e fala "Teste"
        sliderVolume.addEventListener('change', () => {
            volumeAtual = sliderVolume.value;
            falarLetra("Teste");
        });

        // ==== LÓGICA DO VISUALIZADOR (HISTÓRIA E LIVRE) ====
        function abrirVisor(modo) {
            modoAtual = modo;
            document.getElementById('tituloVisor').innerText = modo === 'historia' ? 'Modo História' : 'Modo Livre';
            
            if (modo === 'historia') {
                fotoAtual = 1; // História SEMPRE começa no 1
                seletorLivre.style.display = 'none'; // Esconde seletor
                document.getElementById('dicaVisor').innerText = "Clique ou use a seta ➡️ para avançar";
            } else {
                seletorLivre.style.display = 'block'; // Mostra seletor
                document.getElementById('dicaVisor').innerText = "Use ⬅️ ➡️, clique na foto, ou no menu acima";
            }

            carregarFoto(true);
            abrirTela('telaVisor');
        }

        seletorLivre.addEventListener('change', (e) => {
            fotoAtual = parseInt(e.target.value);
            carregarFoto(true); // Carrega a foto sem falar automaticamente (precisa clicar depois pra falar)
        });

        function carregarFoto(silencioso = false) {
            imagem.style.opacity = 0;

            setTimeout(() => {
                const nomeDaLetra = String.fromCharCode(64 + fotoAtual);
                textoLetra.innerHTML = `<span class="icone-som">🔊</span> Letra ${nomeDaLetra} (${fotoAtual} / 26)`;
                
                // Mantém o seletor sincronizado com a foto que está na tela
                seletorLivre.value = fotoAtual; 

                imagem.onload = () => {
                    imagem.style.opacity = 1;
                    estaTrocando = false; 
                    if (!silencioso) falarLetra(nomeDaLetra);
                };

                imagem.src = `fotos/f${fotoAtual}.jpg`;
            }, 200);
        }

        function mudarFoto(direcao) {
            if (!document.getElementById('telaVisor').classList.contains('ativa')) return;
            if (estaTrocando) return; 

            // NO MODO HISTÓRIA: Impede de voltar letra!
            if (modoAtual === 'historia' && direcao === 'tras') return;

            estaTrocando = true;

            if (direcao === 'frente') {
                fotoAtual++;
                if (fotoAtual > totalDeFotos) fotoAtual = 1;
            } else if (direcao === 'tras') {
                fotoAtual--;
                if (fotoAtual < 1) fotoAtual = totalDeFotos;
            }

            carregarFoto(false);
        }

        imagem.addEventListener('click', () => mudarFoto('frente'));

        document.addEventListener('keydown', (evento) => {
            if (evento.key === 'ArrowRight') mudarFoto('frente'); 
            if (evento.key === 'ArrowLeft') mudarFoto('tras');   
        });

        // ==== LÓGICA DO MODO QUIZ ====
        let respostaCorretaQuiz = '';

        // Função auxiliar de números aleatórios
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Função para embaralhar os botões de resposta
        function embaralhar(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function iniciarQuiz() {
            gerarPerguntaQuiz();
        }

        function gerarPerguntaQuiz() {
            const caixaRespostas = document.getElementById('quizRespostas');
            caixaRespostas.innerHTML = ''; // Limpa botões antigos
            
            // Escolhe um tipo de pergunta (0, 1 ou 2)
            const tipo = randomInt(0, 2);
            let textoPergunta = "";
            let codLetraCorreta = 0;

            if (tipo === 0) {
                // Tipo 0: Qual vem depois de X?
                let letraSorteada = randomInt(1, 25); // 1(A) até 25(Y)
                textoPergunta = `Qual letra vem depois da letra ${String.fromCharCode(64 + letraSorteada)}?`;
                codLetraCorreta = letraSorteada + 1;

            } else if (tipo === 1) {
                // Tipo 1: Qual é a Nª letra?
                let posicao = randomInt(1, 26);
                textoPergunta = `Qual é a ${posicao}ª letra do alfabeto?`;
                codLetraCorreta = posicao;

            } else {
                // Tipo 2: X casas na frente de Y
                let letraInicio = randomInt(1, 20); // Impede que passe de Z
                let casasAvanco = randomInt(2, 26 - letraInicio); 
                textoPergunta = `Qual letra está ${casasAvanco} casas na frente da letra ${String.fromCharCode(64 + letraInicio)}?`;
                codLetraCorreta = letraInicio + casasAvanco;
            }

            // Letra exata que resolve a pergunta
            respostaCorretaQuiz = String.fromCharCode(64 + codLetraCorreta);
            document.getElementById('quizPergunta').innerText = textoPergunta;

            // Gera as opções de resposta (1 certa + 3 erradas únicas)
            let opcoes = [respostaCorretaQuiz];
            while (opcoes.length < 4) {
                let errada = String.fromCharCode(64 + randomInt(1, 26));
                // Garante que a letra errada sorteada não seja igual à certa e nem repetida
                if (!opcoes.includes(errada)) {
                    opcoes.push(errada);
                }
            }

            // Embaralha para a resposta certa não ficar sempre no mesmo lugar
            opcoes = embaralhar(opcoes);

            // Cria os botões na tela
            opcoes.forEach(letraOpcao => {
                let btn = document.createElement('button');
                btn.className = 'btn-quiz';
                btn.innerText = letraOpcao;
                
                btn.onclick = () => {
                    // Impede de clicar de novo se já acertou
                    if (btn.classList.contains('correta') || btn.classList.contains('errada')) return;

                    if (letraOpcao === respostaCorretaQuiz) {
                        btn.classList.add('correta');
                        falarLetra("Correto");
                        
                        // Espera 1.5s e gera a próxima pergunta
                        setTimeout(gerarPerguntaQuiz, 1500);
                    } else {
                        btn.classList.add('errada');
                        falarLetra("Tente novamente");
                        
                        // O vermelho apaga após 1s para ele tentar novamente
                        setTimeout(() => btn.classList.remove('errada'), 1000);
                    }
                };
                caixaRespostas.appendChild(btn);
            });
        }
    </script>
</body>
</html>
