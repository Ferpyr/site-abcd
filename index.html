<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #061126 0%, #122b5e 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            color: #4facfe;
            text-shadow: 0px 4px 15px rgba(79, 172, 254, 0.4);
        }

        p#textoLetra {
            font-size: 1.2rem;
            color: #a0aec0;
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px; /* Espaço entre o texto e o ícone de som */
        }

        /* Ícone de som animado ao lado do texto */
        .icone-som {
            font-size: 1.5rem;
            opacity: 0.8;
        }

        img {
            max-width: 85vw;
            max-height: 55vh;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6), 0px 0px 20px rgba(79, 172, 254, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
        }

        img:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.8), 0px 0px 30px rgba(79, 172, 254, 0.4);
        }

        img:active {
            transform: scale(0.98);
        }

        .dica-teclado {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Alfabeto</h1>
        
        <!-- Adicionei um ícone de "alto-falante" para indicar que agora tem som -->
        <p id="textoLetra"><span class="icone-som">🔊</span> Letra A (1 / 26)</p>
        
        <img id="fotoAlfabeto" src="fotos/f1.jpg" alt="Letra do Alfabeto">
    </div>

    <div class="dica-teclado">Aumente o som 🔊 • Use as setas ⬅️ e ➡️ do teclado ou clique na imagem.</div>

    <script>
        const imagem = document.getElementById('fotoAlfabeto');
        const textoLetra = document.getElementById('textoLetra');
        
        let fotoAtual = 1;
        const totalDeFotos = 26; 
        let estaTrocando = false; 

        // 4. NOVA FUNÇÃO: Fazer o navegador falar a letra
        function falarLetra(letra) {
            // Primeiro, cancela qualquer fala anterior para as vozes não se atropelarem
            window.speechSynthesis.cancel();

            // Cria a "mensagem" com a letra que deve ser falada
            let fala = new SpeechSynthesisUtterance(letra);
            
            // Define o idioma para Português do Brasil
            fala.lang = 'pt-BR';
            
            // Você pode alterar o tom (pitch) e a velocidade (rate). 
            // rate: 1 é o normal. Menor que 1 fica mais lento, maior que 1 mais rápido.
            fala.rate = 1; 

            // Dá o comando para o navegador falar
            window.speechSynthesis.speak(fala);
        }

        function mudarFoto(direcao) {
            if (estaTrocando) return; 
            estaTrocando = true;

            imagem.style.opacity = 0;

            setTimeout(() => {
                // Navegação (frente ou trás)
                if (direcao === 'frente') {
                    fotoAtual++;
                    if (fotoAtual > totalDeFotos) fotoAtual = 1;
                } else if (direcao === 'tras') {
                    fotoAtual--;
                    if (fotoAtual < 1) fotoAtual = totalDeFotos;
                }

                // Descobre a letra (64 + 1 = 65, que é o código da letra 'A')
                const nomeDaLetra = String.fromCharCode(64 + fotoAtual);
                
                // Atualiza o texto mantendo o ícone de som
                textoLetra.innerHTML = `<span class="icone-som">🔊</span> Letra ${nomeDaLetra} (${fotoAtual} / 26)`;

                // Quando a imagem carregar
                imagem.onload = () => {
                    imagem.style.opacity = 1;
                    estaTrocando = false; 
                    
                    // CHAMA A FUNÇÃO DE VOZ no momento exato que a imagem aparece
                    falarLetra(nomeDaLetra);
                };

                // Troca o arquivo da foto
                imagem.src = `fotos/f${fotoAtual}.jpg`;

                // Preload da próxima foto
                let proximaFoto = (fotoAtual % totalDeFotos) + 1;
                let imgPreload = new Image();
                imgPreload.src = `fotos/f${proximaFoto}.jpg`;

            }, 300);
        }

        // Eventos de clique
        imagem.addEventListener('click', () => {
            mudarFoto('frente');
        });

        // Eventos de teclado
        document.addEventListener('keydown', (evento) => {
            if (evento.key === 'ArrowRight') {
                mudarFoto('frente'); 
            } else if (evento.key === 'ArrowLeft') {
                mudarFoto('tras');   
            }
        });

        // Dica: A primeira foto ("A") não falará sozinha ao abrir o site, 
        // pois os navegadores modernos bloqueiam áudio automático sem que 
        // o usuário tenha clicado na tela pelo menos uma vez.
    </script>

</body>
</html>
