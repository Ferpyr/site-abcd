<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #061126 0%, #122b5e 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            color: #4facfe;
            text-shadow: 0px 4px 15px rgba(79, 172, 254, 0.4);
        }

        p.instrucao {
            font-size: 1rem;
            color: #a0aec0;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        img {
            max-width: 85vw;
            max-height: 55vh;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6), 0px 0px 20px rgba(79, 172, 254, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
        }

        img:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.8), 0px 0px 30px rgba(79, 172, 254, 0.4);
        }

        img:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Alfabeto</h1>
        <p class="instrucao">Clique na imagem para ver a próxima letra</p>
        
        <img id="fotoAlfabeto" src="fotos/f1.jpg" alt="Letra do Alfabeto">
    </div>

    <script>
        const imagem = document.getElementById('fotoAlfabeto');
        let fotoAtual = 1;
        const totalDeFotos = 26; 

        imagem.addEventListener('click', () => {
            // 1. Inicia o fade out (apaga a foto atual)
            imagem.style.opacity = 0;

            // 2. Espera os exatos 300ms do CSS para a foto ficar invisível
            setTimeout(() => {
                fotoAtual++;

                if (fotoAtual > totalDeFotos) {
                    fotoAtual = 1;
                }

                // 3. Função fundamental: SÓ acende a tela de novo quando a foto NOVA carregar
                imagem.onload = () => {
                    imagem.style.opacity = 1;
                };

                // 4. Troca a fonte da imagem (isso faz o navegador ir buscar a nova foto)
                imagem.src = `fotos/f${fotoAtual}.jpg`;
                
            }, 300);
        });
    </script>

</body>
</html>
